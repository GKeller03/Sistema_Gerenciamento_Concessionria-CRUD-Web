<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoHub - Bem-vindo</title>
    <link rel="stylesheet" type="text/css" href="resources/css/style.css">
</head>
<body>

    <div class="container">
        <img src="resources/img/Logo-AutoHub.png" alt="AutoHub Logo" class="logo-img">
        
        <h2>Acesso ao Sistema</h2>
        
        <form action="login" method="POST">
            <input type="email" name="email" placeholder="E-mail corporativo" required>
            <input type="password" name="senha" placeholder="Senha" required>
            
            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <div style="margin-top: 20px;">
            <span style="color: #b3b3b3; font-size: 14px;">Novo por aqui?</span><br>
            <a href="cadastro_usuario.html" class="link-footer">Criar uma nova conta</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('erro')) {
            alert("Credenciais inválidas ou sessão expirada.");
        }
    </script>
</body>
</html>
